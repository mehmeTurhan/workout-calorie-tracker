<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hypertrophy Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #0f172a; color: #e2e8f0; }
    h1, h2 { color: #60a5fa; text-align: center; margin: 15px 0; }
    .tab { display: none; padding: 15px 15px 100px; }
    .tab.active { display: block; }
    
    .nav { position: fixed; bottom: 0; width: 100%; background: #1e2937; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #334155; z-index: 100; }
    .nav button { background: none; border: none; color: #94a3b8; font-size: 13px; cursor: pointer; }
    .nav button.active { color: #60a5fa; font-weight: bold; }

    .settings-bar { background: #1e2937; padding: 12px; margin: 10px 0; border-radius: 12px; text-align: center; }
    .day-header { display: flex; align-items: center; justify-content: space-between; margin: 20px 0 10px; }
    .exercise-item { background: #1e2937; padding: 15px; margin: 10px 0; border-radius: 12px; cursor: pointer; position: relative; }
    .exercise-item:hover { background: #334155; }
    .exercise-item .drag-handle { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); cursor: grab; color: #64748b; font-size: 22px; }
    .exercise-item .controls { position: absolute; right: 12px; top: 12px; display: flex; gap: 6px; opacity: 0.8; }
    .exercise-item:hover .controls { opacity: 1; }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; }
    .modal-content { background: #1e2937; margin: 40px auto; padding: 20px; width: 90%; max-width: 520px; border-radius: 12px; }

    button { padding: 12px 20px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
    button:hover { background: #60a5fa; }
    button.danger { background: #ef4444; }
    button.success { background: #22c55e; }

    input, textarea, select { background: #334155; color: #e2e8f0; border: 1px solid #475569; padding: 10px; border-radius: 6px; width: 100%; margin: 5px 0; box-sizing: border-box; }

    canvas { margin: 15px 0; background: #1e2937; border-radius: 12px; padding: 10px; }
    #calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.9em; }
    .calendar-day { padding: 10px 4px; border-radius: 6px; background: #1e2937; cursor: pointer; }
    .calendar-day:hover { background: #334155; }
    .workout-day { background: #22c55e; color: black; font-weight: bold; }

    .history-entry { background: #1e2937; padding: 12px; margin: 8px 0; border-radius: 10px; }
  </style>
</head>
<body>

<h1>Hypertrophy Tracker</h1>

<!-- Global Settings Bar -->
<div class="settings-bar">
  <label>Unit: </label>
  <select id="globalUnit" onchange="changeUnit(this.value)">
    <option value="kg">kg</option>
    <option value="lbs">lbs</option>
  </select>
  <span style="margin-left:20px;">Timezone: </span>
  <select id="globalTimezone" onchange="saveTimezone()">
    <option value="UTC">UTC</option>
    <option value="America/New_York">Eastern Time</option>
    <option value="America/Chicago">Central Time</option>
    <option value="America/Los_Angeles">Pacific Time</option>
  </select>
</div>

<div class="nav">
  <button onclick="showTab('track')" class="active">Track</button>
  <button onclick="showTab('calories')">Calories</button>
  <button onclick="showTab('history')">History</button>
</div>

<!-- TRACK TAB -->
<div id="track" class="tab active">
  <div style="text-align:center; margin:15px 0;">
    <button onclick="toggleProgramEdit()">✏️ Edit Program</button>
  </div>
  <div id="workoutProgram"></div>
</div>

<!-- CALORIES TAB -->
<div id="calories" class="tab">
  <h2>Calorie Tracker</h2>
  <input type="date" id="mealDate">
  <textarea id="mealDesc" rows="3" placeholder="Describe your meal..."></textarea>
  <button onclick="analyzeMeal()">🔍 Analyze with AI</button>

  <div style="background:#1e2937; padding:15px; border-radius:12px; margin:15px 0;">
    <h3>+ Manual Meal Entry</h3>
    <input type="date" id="manualDate">
    <input type="text" id="manualName" placeholder="Meal name">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
      <input type="number" id="manualCal" placeholder="Calories">
      <input type="number" id="manualProt" placeholder="Protein (g)">
      <input type="number" id="manualCarbs" placeholder="Carbs (g)">
      <input type="number" id="manualFat" placeholder="Fat (g)">
    </div>
    <button onclick="addManualMeal()" style="width:100%; margin-top:10px;">Add Meal</button>
  </div>

  <div id="analysisResult" style="margin:15px 0; padding:15px; background:#334155; border-radius:10px; display:none;"></div>
  
  <h3>Today's Meals</h3>
  <table id="foodLog" style="width:100%; border-collapse:collapse;"></table>
  <h3>Daily Total — Calories: <span id="totalCal">0</span> kcal | Protein: <span id="totalProt">0</span> g</h3>
</div>

<!-- HISTORY TAB -->
<div id="history" class="tab">
  <h2>History & Progress</h2>
  
  <h3>Weight Tracking</h3>
  <input type="date" id="weightDate">
  <input type="number" id="weightInput" placeholder="Body weight" style="width:60%;">
  <button onclick="logWeight()">Log Weight</button>
  <canvas id="weightChart" height="160"></canvas>

  <h3>Progressive Overload</h3>
  <select id="exerciseSelect" onchange="renderProgressChart()" style="margin-bottom:10px;"></select>
  <canvas id="progressChart" height="200"></canvas>

  <h3>Daily Nutrition</h3>
  <canvas id="nutritionChart" height="200"></canvas>

  <h3>Workout Calendar</h3>
  <div id="calendar"></div>

  <div id="dayDetail" style="margin-top:20px; display:none;">
    <h3 id="selectedDate"></h3>
    <div id="dayLogs"></div>
  </div>
</div>

<!-- Modals -->
<div id="logModal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle"></h2>
    <input type="date" id="workoutLogDate">
    <div id="setsArea"></div>
    <button onclick="addSetToCurrent()">+ Add Set</button><br><br>
    <button onclick="saveCurrentLog()" class="success">Save Exercise</button>
    <button onclick="closeLogModal()" class="danger">Cancel</button>
  </div>
</div>

<div id="editExerciseModal" class="modal">
  <div class="modal-content">
    <h2>Edit Exercise</h2>
    <input type="text" id="editName" placeholder="Exercise Name">
    <div style="display:flex; gap:10px;">
      <input type="number" id="editSets" placeholder="Sets" style="width:50%">
      <input type="text" id="editReps" placeholder="Reps" style="width:50%">
    </div>
    <button onclick="saveEditedExercise()" class="success">Save Changes</button>
    <button onclick="closeEditModal()" class="danger">Cancel</button>
  </div>
</div>

<div id="addExerciseModal" class="modal">
  <div class="modal-content">
    <h2>Add New Exercise</h2>
    <input type="text" id="newExerciseName" placeholder="Exercise Name">
    <div style="display:flex; gap:10px;">
      <input type="number" id="newSets" value="3" style="width:50%">
      <input type="text" id="newReps" value="8-12" style="width:50%">
    </div>
    <button onclick="saveNewExercise()" class="success">Add Exercise</button>
    <button onclick="closeAddModal()" class="danger">Cancel</button>
  </div>
</div>

<script>
// ====================== DATA ======================
let workoutProgram = [
  { id: "push", day: "Monday - Push", exercises: [
    { id: "bp1", name: "Bench Press", sets: 4, reps: "6-10" },
    { id: "idp1", name: "Incline Dumbbell Press", sets: 4, reps: "6-10" },
    { id: "ohp1", name: "Overhead Press", sets: 3, reps: "6-10" },
    { id: "lr1", name: "Lateral Raises", sets: 3, reps: "10-15" },
    { id: "rdf1", name: "Rear Delt Flyes", sets: 3, reps: "10-15" },
    { id: "tp1", name: "Tricep Pushdowns", sets: 3, reps: "10-15" },
    { id: "ote1", name: "Overhead Tricep Extension", sets: 3, reps: "10-15" }
  ]},
  { id: "pull", day: "Tuesday - Pull", exercises: [
    { id: "lp1", name: "Lat Pulldown / Pull-Ups", sets: 4, reps: "6-10" },
    { id: "bor1", name: "Bent-Over Row", sets: 4, reps: "6-10" },
    { id: "sadr1", name: "Single-Arm Dumbbell Row", sets: 3, reps: "6-10 / side" },
    { id: "fp1", name: "Face Pulls", sets: 3, reps: "10-15" },
    { id: "bc1", name: "Barbell Curls", sets: 3, reps: "10-15" },
    { id: "hc1", name: "Hammer Curls", sets: 3, reps: "10-15" }
  ]},
  { id: "legs", day: "Wednesday - Legs", exercises: [
    { id: "lp2", name: "Leg Press or Back Squat", sets: 4, reps: "6-10" },
    { id: "rdl1", name: "Romanian Deadlift", sets: 3, reps: "8-12" },
    { id: "bss1", name: "Bulgarian Split Squats", sets: 3, reps: "8-12 / leg" },
    { id: "lc1", name: "Leg Curl", sets: 3, reps: "10-15" },
    { id: "cr1", name: "Calf Raises", sets: 4, reps: "10-15" }
  ]},
  { id: "upper", day: "Friday - Upper + Legs", exercises: [
    { id: "bp2", name: "Bench Press (flat/close-grip)", sets: 3, reps: "6-10" },
    { id: "ohp2", name: "Overhead Press", sets: 3, reps: "6-10" },
    { id: "cr2", name: "Cable Row", sets: 3, reps: "8-12" },
    { id: "lr2", name: "Lateral Raises", sets: 3, reps: "10-15" },
    { id: "rdf2", name: "Rear Delt Flyes", sets: 3, reps: "10-15" },
    { id: "ht1", name: "Hip Thrusts", sets: 2, reps: "8-12" }
  ]}
];

let foodHistory = [];
let weightHistory = [];
let workoutLogs = {};

let settings = { weightUnit: "kg", timezone: "UTC" };
let isEditingProgram = false;
let currentDayIndex = null;
let currentExerciseIndex = null;
let currentLog = null;

function loadData() {
  if (localStorage.getItem('workoutProgram')) workoutProgram = JSON.parse(localStorage.getItem('workoutProgram'));
  if (localStorage.getItem('foodHistory')) foodHistory = JSON.parse(localStorage.getItem('foodHistory'));
  if (localStorage.getItem('weightHistory')) weightHistory = JSON.parse(localStorage.getItem('weightHistory'));
  if (localStorage.getItem('workoutLogs')) workoutLogs = JSON.parse(localStorage.getItem('workoutLogs'));
  if (localStorage.getItem('trackerSettings')) settings = JSON.parse(localStorage.getItem('trackerSettings'));
}

function saveAll() {
  localStorage.setItem('workoutProgram', JSON.stringify(workoutProgram));
  localStorage.setItem('foodHistory', JSON.stringify(foodHistory));
  localStorage.setItem('weightHistory', JSON.stringify(weightHistory));
  localStorage.setItem('workoutLogs', JSON.stringify(workoutLogs));
  localStorage.setItem('trackerSettings', JSON.stringify(settings));
}

function changeUnit(newUnit) {
  if (settings.weightUnit === newUnit) return;
  const oldUnit = settings.weightUnit;
  settings.weightUnit = newUnit;

  weightHistory.forEach(w => {
    w.weight = oldUnit === "kg" ? Math.round(w.weight * 2.20462) : Math.round(w.weight / 2.20462);
  });

  Object.keys(workoutLogs).forEach(date => {
    workoutLogs[date].forEach(log => {
      log.sets.forEach(s => {
        if (s.weight && s.weight !== '-') {
          const w = parseFloat(s.weight);
          s.weight = oldUnit === "kg" ? Math.round(w * 2.20462) : Math.round(w / 2.20462);
        }
      });
    });
  });

  saveAll();
  alert(`Units changed to ${newUnit}. All historical data updated.`);
  renderWeightChart();
  renderProgressChart();
}

function saveTimezone() {
  settings.timezone = document.getElementById('globalTimezone').value;
  saveAll();
}

// Render Workout Program
function renderWorkoutProgram() {
  const container = document.getElementById('workoutProgram');
  container.innerHTML = '';

  workoutProgram.forEach((day, dayIndex) => {
    let html = `<div class="day-header"><h2>${day.day}</h2>${isEditingProgram ? `<button onclick="addExerciseToDay(${dayIndex})">+ Add Exercise</button>` : ''}</div>`;
    day.exercises.forEach((ex, exIndex) => {
      html += `
        <div class="exercise-item" draggable="${isEditingProgram}" 
             ondragstart="dragStart(event, ${dayIndex}, ${exIndex})"
             ondragover="dragOver(event)"
             ondrop="drop(event, ${dayIndex}, ${exIndex})"
             onclick="${isEditingProgram ? '' : `openLogModal(${dayIndex}, ${exIndex})`}">
          ${isEditingProgram ? `<span class="drag-handle">☰</span>` : ''}
          <strong>${ex.name}</strong><br>
          <small>${ex.sets} sets × ${ex.reps}</small>
          ${isEditingProgram ? `
            <div class="controls">
              <button onclick="editExercise(${dayIndex}, ${exIndex}); event.stopImmediatePropagation();">✏️</button>
              <button onclick="deleteExercise(${dayIndex}, ${exIndex}); event.stopImmediatePropagation();" class="danger">🗑</button>
            </div>` : ''}
        </div>`;
    });
    container.innerHTML += html;
  });
}

function dragStart(e, dayIndex, exIndex) { e.dataTransfer.setData("text", JSON.stringify({dayIndex, exIndex})); }
function dragOver(e) { e.preventDefault(); }
function drop(e, targetDayIndex, targetExIndex) {
  e.preventDefault();
  const data = JSON.parse(e.dataTransfer.getData("text"));
  if (data.dayIndex !== targetDayIndex) return;
  const day = workoutProgram[targetDayIndex];
  const [moved] = day.exercises.splice(data.exIndex, 1);
  day.exercises.splice(targetExIndex, 0, moved);
  saveAll();
  renderWorkoutProgram();
}

function toggleProgramEdit() { isEditingProgram = !isEditingProgram; renderWorkoutProgram(); }
function editExercise(d, e) { currentDayIndex = d; currentExerciseIndex = e; const ex = workoutProgram[d].exercises[e]; document.getElementById('editName').value = ex.name; document.getElementById('editSets').value = ex.sets; document.getElementById('editReps').value = ex.reps; document.getElementById('editExerciseModal').style.display = 'block'; }
function saveEditedExercise() {
  const ex = workoutProgram[currentDayIndex].exercises[currentExerciseIndex];
  ex.name = document.getElementById('editName').value || ex.name;
  ex.sets = parseInt(document.getElementById('editSets').value) || ex.sets;
  ex.reps = document.getElementById('editReps').value || ex.reps;
  saveAll(); closeEditModal(); renderWorkoutProgram();
}
function closeEditModal() { document.getElementById('editExerciseModal').style.display = 'none'; }
function deleteExercise(d, e) { if(confirm("Delete exercise?")) { workoutProgram[d].exercises.splice(e,1); saveAll(); renderWorkoutProgram(); } }
function addExerciseToDay(d) { currentDayIndex = d; document.getElementById('addExerciseModal').style.display = 'block'; }
function saveNewExercise() {
  const name = document.getElementById('newExerciseName').value.trim();
  if(!name) return alert("Name required");
  workoutProgram[currentDayIndex].exercises.push({id: 'ex'+Date.now(), name, sets: parseInt(document.getElementById('newSets').value)||3, reps: document.getElementById('newReps').value||'8-12'});
  saveAll(); closeAddModal(); renderWorkoutProgram();
}
function closeAddModal() { document.getElementById('addExerciseModal').style.display = 'none'; }

// Logging
function openLogModal(dayIndex, exIndex) {
  const ex = workoutProgram[dayIndex].exercises[exIndex];
  currentLog = { exercise: ex.name, dayType: workoutProgram[dayIndex].day };
  document.getElementById('modalTitle').textContent = ex.name;
  document.getElementById('workoutLogDate').value = new Date().toISOString().split('T')[0];
  const area = document.getElementById('setsArea');
  area.innerHTML = '';
  for (let i = 1; i <= ex.sets; i++) {
    area.innerHTML += `<div style="background:#334155;padding:12px;margin:8px 0;border-radius:8px;"><strong>Set ${i}</strong><br><input type="number" placeholder="Weight" id="w${i}" style="width:48%"><input type="number" placeholder="Reps" id="r${i}" style="width:48%"></div>`;
  }
  document.getElementById('logModal').style.display = 'block';
}

function addSetToCurrent() {
  const area = document.getElementById('setsArea');
  const num = area.children.length + 1;
  area.innerHTML += `<div style="background:#334155;padding:12px;margin:8px 0;border-radius:8px;"><strong>Set ${num}</strong><br><input type="number" placeholder="Weight" id="w${num}" style="width:48%"><input type="number" placeholder="Reps" id="r${num}" style="width:48%"></div>`;
}

function saveCurrentLog() {
  const sets = [];
  const divs = document.querySelectorAll('#setsArea > div');
  divs.forEach((_, i) => {
    sets.push({set: i+1, weight: document.getElementById(`w${i+1}`).value || '-', reps: document.getElementById(`r${i+1}`).value || '-'});
  });

  const logDate = document.getElementById('workoutLogDate').value;
  if (!workoutLogs[logDate]) workoutLogs[logDate] = [];
  workoutLogs[logDate].push({
    exercise: currentLog.exercise,
    dayType: currentLog.dayType,
    sets: sets,
    timestamp: new Date().toLocaleString()
  });

  saveAll();
  alert(`Logged for ${logDate}`);
  closeLogModal();
  if (document.getElementById('history').classList.contains('active')) renderProgressChart();
}

function closeLogModal() { document.getElementById('logModal').style.display = 'none'; }

// Calorie functions (simplified)
function analyzeMeal() {
  const desc = document.getElementById('mealDesc').value.trim();
  if (!desc) return alert("Describe your meal");
  let cal = 500, prot = 30, carbs = 50, fat = 15;
  const lower = desc.toLowerCase();
  if (lower.includes("chicken") || lower.includes("beef")) { cal += 220; prot += 35; }
  if (lower.includes("rice")) { cal += 180; carbs += 40; }
  document.getElementById('analysisResult').innerHTML = `<strong>Estimated:</strong><br>${cal} kcal | ${prot}g P | ${carbs}g C | ${fat}g F`;
  document.getElementById('analysisResult').style.display = 'block';
  addFoodEntry(desc, cal, prot, carbs, fat);
}

function addManualMeal() {
  const name = document.getElementById('manualName').value.trim();
  const cal = parseInt(document.getElementById('manualCal').value) || 0;
  if (!name || cal <= 0) return alert("Name and calories required");

  const date = document.getElementById('manualDate').value || new Date().toISOString().split('T')[0];
  foodHistory.unshift({date, name, calories: cal, protein: parseInt(document.getElementById('manualProt').value)||0, carbs: parseInt(document.getElementById('manualCarbs').value)||0, fat: parseInt(document.getElementById('manualFat').value)||0});
  saveAll();
  renderTodayMeals();
  updateTotals();
}

function addFoodEntry(name, cal, prot, carbs, fat) {
  const date = document.getElementById('mealDate').value || new Date().toISOString().split('T')[0];
  foodHistory.unshift({date, name, calories:cal, protein:prot, carbs, fat});
  saveAll();
  renderTodayMeals();
  updateTotals();
}

function renderTodayMeals() {
  const today = new Date().toISOString().split('T')[0];
  const table = document.getElementById('foodLog');
  table.innerHTML = `<tr style="background:#334155"><th style="text-align:left">Meal</th><th>Cal</th><th>P</th><th>C</th><th>F</th></tr>`;
  foodHistory.filter(m => m.date === today).forEach(m => {
    const row = table.insertRow();
    row.innerHTML = `<td style="text-align:left">${m.name}</td><td>${m.calories}</td><td>${m.protein}</td><td>${m.carbs}</td><td>${m.fat}</td>`;
  });
}

function updateTotals() {
  let c = 0, p = 0;
  foodHistory.forEach(m => { c += m.calories||0; p += m.protein||0; });
  document.getElementById('totalCal').textContent = c;
  document.getElementById('totalProt').textContent = p;
}

// Progressive Overload & Charts
function populateExerciseSelect() {
  const select = document.getElementById('exerciseSelect');
  select.innerHTML = '<option value="">Select Exercise</option>';
  const names = new Set();
  workoutProgram.forEach(day => day.exercises.forEach(ex => names.add(ex.name)));
  names.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });
}

function renderProgressChart() {
  const name = document.getElementById('exerciseSelect').value;
  if (!name) return;
  const ctx = document.getElementById('progressChart');
  if (window.progChart) window.progChart.destroy();

  const dataPoints = [];
  Object.keys(workoutLogs).sort().forEach(date => {
    (workoutLogs[date] || []).forEach(log => {
      if (log.exercise === name) {
        let volume = 0;
        log.sets.forEach(s => volume += (parseFloat(s.weight)||0) * (parseFloat(s.reps)||0));
        dataPoints.push({date, volume});
      }
    });
  });

  window.progChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dataPoints.map(d => d.date),
      datasets: [{ label: 'Volume (kg×reps)', data: dataPoints.map(d => d.volume), borderColor: '#60a5fa', tension: 0.3 }]
    },
    options: { responsive: true }
  });
}

function logWeight() {
  const w = parseFloat(document.getElementById('weightInput').value);
  if (!w) return alert("Enter weight");
  const date = document.getElementById('weightDate').value || new Date().toISOString().split('T')[0];
  weightHistory.unshift({date, weight: w});
  saveAll();
  renderWeightChart();
}

function renderWeightChart() {
  const ctx = document.getElementById('weightChart');
  if (window.wChart) window.wChart.destroy();
  const recent = weightHistory.slice(0, 30).reverse();
  window.wChart = new Chart(ctx, {
    type: 'line',
    data: { labels: recent.map(d=>d.date), datasets: [{ label: `Weight (${settings.weightUnit})`, data: recent.map(d=>d.weight), borderColor: '#60a5fa' }] },
    options: { responsive: true }
  });
}

function renderNutritionChart() {
  const ctx = document.getElementById('nutritionChart');
  if (window.nutChart) window.nutChart.destroy();

  const daily = {};
  foodHistory.forEach(m => {
    if (!daily[m.date]) daily[m.date] = {cal:0, prot:0, carbs:0, fat:0};
    daily[m.date].cal += m.calories||0;
    daily[m.date].prot += m.protein||0;
    daily[m.date].carbs += m.carbs||0;
    daily[m.date].fat += m.fat||0;
  });

  const dates = Object.keys(daily).sort().slice(-30);
  window.nutChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: dates,
      datasets: [
        { label: 'Calories', data: dates.map(d=>daily[d].cal), backgroundColor: '#3b82f6' },
        { label: 'Protein', data: dates.map(d=>daily[d].prot), backgroundColor: '#22c55e' }
      ]
    },
    options: { responsive: true }
  });
}

function renderCalendar() {
  const container = document.getElementById('calendar');
  container.innerHTML = '';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    const el = document.createElement('div');
    el.style.fontWeight = 'bold';
    el.textContent = d;
    container.appendChild(el);
  });

  const now = new Date();
  const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
  for (let i = 0; i < firstDay; i++) container.appendChild(document.createElement('div'));

  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el = document.createElement('div');
    el.className = 'calendar-day';
    el.textContent = d;
    if (workoutLogs[dateStr]) el.classList.add('workout-day');
    el.onclick = () => showDayDetail(dateStr);
    container.appendChild(el);
  }
}

function showDayDetail(dateStr) {
  document.getElementById('selectedDate').textContent = `Details for ${dateStr}`;
  const container = document.getElementById('dayLogs');
  container.innerHTML = '';

  const workouts = workoutLogs[dateStr] || [];
  if (workouts.length > 0) {
    container.innerHTML += `<h4>Workout</h4>`;
    workouts.forEach(log => {
      let html = `<div class="history-entry"><strong>${log.exercise}</strong><br>`;
      log.sets.forEach(s => html += `Set ${s.set}: ${s.weight} ${settings.weightUnit} × ${s.reps}<br>`);
      html += `<small>${log.timestamp}</small></div>`;
      container.innerHTML += html;
    });
  }

  const meals = foodHistory.filter(m => m.date === dateStr);
  if (meals.length > 0) {
    container.innerHTML += `<h4>Meals</h4>`;
    meals.forEach(m => {
      container.innerHTML += `<div class="history-entry">${m.name} — ${m.calories} kcal | ${m.protein}g P | ${m.carbs}g C | ${m.fat}g F</div>`;
    });
  }

  if (workouts.length === 0 && meals.length === 0) container.innerHTML = '<p>No data for this day.</p>';
  document.getElementById('dayDetail').style.display = 'block';
}

function showTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tabName).classList.add('active');

  if (tabName === 'history') {
    renderCalendar();
    renderWeightChart();
    renderNutritionChart();
    populateExerciseSelect();
    renderProgressChart();
  }
  if (tabName === 'calories') {
    renderTodayMeals();
    updateTotals();
  }
  if (tabName === 'track') renderWorkoutProgram();
}

window.onload = () => {
  loadData();
  document.getElementById('globalUnit').value = settings.weightUnit;
  document.getElementById('globalTimezone').value = settings.timezone;

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('mealDate').value = today;
  document.getElementById('manualDate').value = today;
  document.getElementById('weightDate').value = today;
  document.getElementById('workoutLogDate').value = today;

  renderWorkoutProgram();
  showTab('track');
};
</script>
</body>
</html>
